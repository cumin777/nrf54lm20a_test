# Official nRF Edge AI runtime and the Axon NPU gesture model.
CONFIG_NRF_EDGEAI=y
CONFIG_NEWLIB_LIBC=y
CONFIG_FPU=y
CONFIG_NRF_AXON_INTERLAYER_BUFFER_SIZE=512

# XIAO nRF54LM20B peripherals.
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_MFD=y
CONFIG_REGULATOR=y
CONFIG_SENSOR=y
CONFIG_LSM6DSL=y
# Use runtime settings selected by src/imu_lsm6dsl.c.
CONFIG_LSM6DSL_ACCEL_FS=0
CONFIG_LSM6DSL_ACCEL_ODR=0
CONFIG_LSM6DSL_GYRO_FS=0
CONFIG_LSM6DSL_GYRO_ODR=0
CONFIG_PWM=y

# Logging over the UART21 console chosen in the board overlay.
CONFIG_LOG=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_ASSERT=y
CONFIG_ASSERT_VERBOSE=y

# The board defaults to CDC ACM.  This app uses the castellated UART21
# (P1.08 TX / P1.09 RX) and does not initialize any USB device class.
CONFIG_BOARD_SERIAL_BACKEND_CDC_ACM=n

# Bluetooth LE HID remote-control mode.
CONFIG_BT=y
CONFIG_BT_MAX_CONN=2
CONFIG_BT_SMP=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_L2CAP_TX_BUF_COUNT=5
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="XIAO Edge AI Gesture Remote"
CONFIG_BT_DEVICE_APPEARANCE=961
CONFIG_BT_GATT_UUID16_POOL_SIZE=40
CONFIG_BT_GATT_CHRC_POOL_SIZE=20
CONFIG_BT_CONN_CTX=y

CONFIG_BT_DIS_MANUF_NAME=y
CONFIG_BT_DIS_MANUF_NAME_STR="Seeed Studio"
CONFIG_BT_DIS_PNP_VID_SRC=2
CONFIG_BT_DIS_PNP_VID=0x2886
CONFIG_BT_DIS_PNP_PID=0x0001
CONFIG_BT_DIS_PNP_VER=0x0100

# Persist BLE bonds in the board storage partition.
CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
