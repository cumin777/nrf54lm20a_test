# Serial and UART (poll mode; NO async — async makes uart_poll_in() return
# -ENOTSUP on nrfx UARTE, which breaks RX. Matches the 07-uart_21_1M sample.)
CONFIG_SERIAL=y

# Console (uart21 = stamp-hole serial, where logs are read)
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Logging to console (uart21)
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_DEFAULT_LEVEL=3
