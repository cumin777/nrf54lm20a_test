CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y

CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_MFD=y
CONFIG_REGULATOR=y

CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_UART_20_ASYNC=y
CONFIG_UART_21_ASYNC=y
CONFIG_UART_NRFX_UARTE_ENHANCED_RX=y

# uart21 carries the binary audio protocol (START/audio/END) consumed by
# record.py. Keep it clean: no log text, no boot banner.
CONFIG_LOG=n
CONFIG_BOOT_BANNER=n
