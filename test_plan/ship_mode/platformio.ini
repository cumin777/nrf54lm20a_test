; PlatformIO Project Configuration File
;
; nPM1300 ship mode demo for XIAO nRF54LM20A/B.
; Puts the on-board PMIC regulator parent into ship mode (lowest storage
; current); the board powers off and only a power cycle / specific wake wakes it.

[env:seeed-xiao-nrf54lm20a]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
framework = zephyr
board = seeed-xiao-nrf54lm20a
monitor_speed = 115200

[env:seeed-xiao-nrf54lm20b]
platform = https://github.com/cumin777/platform-seeedboards.git#seeed_nrf54lm20b_xiao_α_test
framework = zephyr
board = seeed-xiao-nrf54lm20b
monitor_speed = 115200
