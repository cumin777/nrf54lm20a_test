# Regulator framework + nPM1300 PMIC (ship mode via regulator parent)
CONFIG_REGULATOR=y
CONFIG_MFD=y
CONFIG_I2C=y
CONFIG_NPM13XX_CHARGER=y

# GPIO (PMIC I2C is bit-banged: P1.18=SDA, P1.17=SCL)
CONFIG_GPIO=y

# Wait before entering ship mode to avoid deadlocking devices which can't be
# debugged while in ship mode (hard/impossible to recover if entered too soon).
CONFIG_BOOT_DELAY=2000

# Console (status output on uart21, 115200)
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
