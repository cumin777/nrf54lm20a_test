; PlatformIO Project Configuration File

[env:seeed-xiao-nrf54lm20a]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
framework = zephyr
board = seeed-xiao-nrf54lm20a
monitor_speed = 115200
upload_protocol = pyocd

[env:seeed-xiao-nrf54lm20b]
platform = https://github.com/cumin777/platform-seeedboards.git#seeed_nrf54lm20b_xiao_α_test
framework = zephyr
board = seeed-xiao-nrf54lm20b
; BLE controller (CONFIG_BT_LL_SW_SPLIT) needs the pinned gcc 9.2 toolchain,
; otherwise the build fails at subsys/bluetooth/controller/hal/debug.h:52.
platform_packages =
  platformio/toolchain-gccarmnoneeabi@~1.90201.0
monitor_speed = 115200
upload_protocol = pyocd
