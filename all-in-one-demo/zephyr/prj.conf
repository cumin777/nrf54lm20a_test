# Serial / Logging
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_WATCHDOG=y
CONFIG_REBOOT=y

# GPIO
CONFIG_GPIO=y

# I2C (PMIC, IMU)
CONFIG_I2C=y

# SPI (Flash)
CONFIG_SPI=y

# DMIC (Microphone)
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y

# Flash
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_SPI_NOR=y

# IMU (LSM6DSL)
CONFIG_SENSOR=y
CONFIG_LSM6DSL=y
CONFIG_LSM6DSL_TRIGGER_NONE=y

# NPM1300 PMIC / Charger
CONFIG_MFD=y
CONFIG_NPM13XX_CHARGER=y
CONFIG_REGULATOR=y

# BLE (broadcast only, open-source LL controller)
CONFIG_BT=y
CONFIG_BT_DEVICE_NAME="nrf54lm20a-demo"
CONFIG_BT_BROADCASTER=y
# CONFIG_BT_CTLR=y  # removed: undefined in Zephyr 4.4; open-source LL via BT_LL_SW_SPLIT + zephyr,bt-hci chosen
CONFIG_BT_LL_SW_SPLIT=y

# Float printing
CONFIG_CBPRINTF_FP_SUPPORT=y

# Stack sizes (BLE controller needs large stacks)
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_BT_RX_STACK_SIZE=8192
CONFIG_BT_HCI_TX_STACK_SIZE_WITH_PROMPT=y
CONFIG_BT_HCI_TX_STACK_SIZE=4096

# Low-frequency clock: use LFXO (32.768 kHz external crystal)
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_500PPM=y
